<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR Access</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3c4159,#0f2740);
color:#fff;
text-align:center;
}

.header{
font-size:26px;
margin-top:80px;
color:#e6d3a3;
}

.card{
width:420px;
margin:20px auto;
background:#fff;
border-radius:12px;
position:relative;
overflow:hidden;
}

.top{
background:#d6a843;
color:#fff;
padding:14px;
font-size:18px;
}

.time{
color:#2ecc71;
font-size:22px;
margin-top:10px;
}

#qrcode{
margin:10px auto 5px auto;
width:360px;
height:360px;
}

.refresh{
color:#888;
margin-bottom:12px;
}

.dot-left{
position:absolute;
left:-8px;
top:70px;
width:16px;
height:16px;
background:#2d3046;
border-radius:50%;
}

.dot-right{
position:absolute;
right:-8px;
top:70px;
width:16px;
height:16px;
background:#2d3046;
border-radius:50%;
}

.text{
color:#e6d3a3;
width:85%;
margin:40px auto;
line-height:1.8;
font-size:20px;
}

</style>
</head>

<body>

<div class="header">
V23080280 (Ngô Quý Thìn)
</div>

<div class="card">

<div class="dot-left"></div>
<div class="dot-right"></div>

<div class="top">
将二维码对准扫描器刷码出场
</div>

<div class="time" id="time"></div>

<div id="qrcode"></div>

<div class="refresh">
刷新二维码
</div>

</div>

<div class="text">
尊敬的员工您好，您已进入企业涉密区域，
出于企业安全考虑，您的手机摄像头将被禁止拍摄，
感谢您的配合。
</div>

<script>

function updateTime(){

let now=new Date()

let y=now.getFullYear()
let m=now.getMonth()+1
let d=now.getDate()
let h=now.getHours()
let mi=now.getMinutes()
let s=now.getSeconds()

let time=y+"-"+m+"-"+d+" "+h+":"+mi+":"+s

document.getElementById("time").innerHTML=time

}

setInterval(updateTime,1000)

updateTime()

new QRCode(document.getElementById("qrcode"),{
text:"V23080280",
width:330,
height:330,
correctLevel:QRCode.CorrectLevel.H
})
#qrcode canvas{
image-rendering: pixelated;
}
</script>

</body>
</html>
