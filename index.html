<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Security QR</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#3b3f56,#0e1424);
text-align:center;
color:white;
}

.id{
margin-top:80px;
font-size:22px;
color:#e6d69a;
}

.card{
width:340px;
margin:25px auto;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.header{
background:#e7b94b;
padding:18px;
font-size:18px;
color:white;
}

.time{
font-size:22px;
color:#00cc44;
margin:15px;
}

#qrcode{
padding-bottom:20px;
}

.refresh{
color:#888;
margin-bottom:20px;
}

.notice{
width:85%;
margin:40px auto;
line-height:1.8;
color:#e6d69a;
font-size:16px;
}

</style>
</head>

<body>

<div class="id">
V23080280 (Ngô Quý Thìn)
</div>

<div class="card">

<div class="header">
将二维码对准扫描器刷码出场
</div>

<div class="time" id="time"></div>

<div id="qrcode"></div>

<div class="refresh">
刷新二维码
</div>

</div>

<div class="notice">
尊敬的员工您好，您已进入企业涉密区域，<br>
出于企业安全考虑，您的手机摄像头将被禁止拍摄，<br>
感谢您的配合。
</div>

<script>

let qr

function updateQR(){

let now=new Date()

let time=
now.getFullYear()+"-"+
(now.getMonth()+1)+"-"+
now.getDate()+" "+
String(now.getHours()).padStart(2,'0')+":"+
String(now.getMinutes()).padStart(2,'0')+":"+
String(now.getSeconds()).padStart(2,'0')

document.getElementById("time").innerHTML=time

let data="ID:V23080280|TIME:"+time

if(!qr){
qr=new QRCode(document.getElementById("qrcode"),{
text:data,
width:320,
height:320
})
}

}

updateQR()

setInterval(updateQR,1000)

</script>

</body>
</html>
