<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Access</title>

<!-- QR Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background:linear-gradient(180deg,#3f425a 0%,#0f2740 100%);
display:flex;
flex-direction:column;
align-items:center;
position:relative;
overflow:hidden;
}

/* SECURITY chip background */
body::after{
content:"SECURITY";
position:absolute;
bottom:40px;
font-size:120px;
color:white;
opacity:0.05;
transform:rotate(-25deg);
pointer-events:none;
}

/* Header */
.header{
margin-top:70px;
font-size:26px;
color:#E6D3A3;
}

/* Card */
.card{
margin-top:20px;
width:360px;
background:#fff;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
position:relative;
overflow:hidden;
}

/* Yellow bar */
.top{
background:#D4A847;
color:white;
text-align:center;
padding:12px;
font-size:18px;
}

/* Side dots */
.dot-left,
.dot-right{
width:14px;
height:14px;
background:#2E3146;
border-radius:50%;
position:absolute;
top:68px;
}

.dot-left{
left:-7px;
}

.dot-right{
right:-7px;
}

/* Time */
.time{
text-align:center;
font-size:20px;
margin-top:10px;
color:#000;
}

/* QR */
#qrcode{
display:flex;
justify-content:center;
margin-top:10px;
}

/* refresh text */
.refresh{
text-align:center;
font-size:14px;
color:#888;
margin-top:6px;
margin-bottom:12px;
}

/* bottom message */
.text{
color:#E6D3A3;
font-size:20px;
line-height:1.8;
width:85%;
text-align:center;
margin-top:40px;
}

</style>
</head>

<body>

<div class="header">
V23080280 (Ngô Quý Thìn)
</div>

<div class="card">

<div class="dot-left"></div>
<div class="dot-right"></div>

<div class="top">
将二维码对准扫描器刷码出场
</div>

<div class="time" id="time"></div>

<div id="qrcode"></div>

<div class="refresh">
刷新二维码
</div>

</div>

<div class="text">
尊敬的员工您好，您已进入企业涉密区域，<br>
出于企业安全考虑，您的手机摄像头将被禁止拍摄，<br>
感谢您的配合。
</div>

<script>

/* TIME AUTO UPDATE */
function updateTime(){
let now=new Date()

let y=now.getFullYear()
let m=now.getMonth()+1
let d=now.getDate()
let h=String(now.getHours()).padStart(2,'0')
let mi=String(now.getMinutes()).padStart(2,'0')
let s=String(now.getSeconds()).padStart(2,'0')

document.getElementById("time").innerHTML =
y+"-"+m+"-"+d+" "+h+":"+mi+":"+s
}

setInterval(updateTime,1000)
updateTime()

/* QR CODE */
new QRCode(document.getElementById("qrcode"),{
text:"V23080280",
width:300,
height:300,
correctLevel:QRCode.CorrectLevel.H
})

</script>

</body>
</html>
