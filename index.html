<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure QR Pass</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
background:linear-gradient(180deg,#1e2233,#0e1120);
font-family:Arial;
text-align:center;
color:white;
margin:0;
}

.container{
margin-top:70px;
}

.name{
font-size:22px;
margin-bottom:20px;
color:#e6d7a3;
}

.card{
background:white;
width:330px;
margin:auto;
border-radius:12px;
overflow:hidden;
color:black;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.header{
background:#f3c24d;
padding:15px;
font-weight:bold;
}

#time{
margin:15px;
font-size:18px;
}

#qrcode{
padding-bottom:20px;
}

.notice{
margin-top:40px;
color:#ddd;
font-size:14px;
padding:20px;
line-height:1.5;
}
</style>

</head>

<body>

<div class="container">

<div class="name">
ID: V23080280 (Ngô Quý Thìn)
</div>

<div class="card">

<div class="header">
Scan QR at security gate
</div>

<div id="time"></div>

<div id="qrcode"></div>

</div>

<div class="notice">
You are entering a secure company area.<br>
Camera usage may be restricted for security reasons.
</div>

</div>

<script>

function updateQR(){

let now=new Date()

let time=now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate()+" "
+now.getHours()+":"+now.getMinutes()+":"+now.getSeconds()

document.getElementById("time").innerHTML=time

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{
text:"EMP:V23080280|TIME:"+time,
width:220,
height:220
})

}

updateQR()

setInterval(updateQR,1000)

</script>

</body>
</html>
