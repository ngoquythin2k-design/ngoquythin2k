<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Access</title>

<style>

body{
background: linear-gradient(#2c2f48,#1b1e2f);
font-family: Arial;
text-align:center;
color:white;
}

h3{
margin-top:30px;
font-weight:500;
}

.card{
width:340px;
margin:20px auto;
background:white;
border-radius:18px;
padding-bottom:25px;
color:black;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
position:relative;
}

/* thanh vàng */

.top{
background:#e3b64b;
padding:18px;
border-radius:18px 18px 0 0;
font-size:16px;
}

/* hai chấm nằm ở ranh giới vàng trắng */

.card:before,
.card:after{
content:"";
width:14px;
height:14px;
background:#2c2f48;
border-radius:50%;
position:absolute;
top:70px;
}

.card:before{
left:-7px;
}

.card:after{
right:-7px;
}

.time{
margin-top:15px;
font-size:16px;
}

.qr img{
width:270px;
height:270px;
image-rendering: pixelated;
}

.refresh{
color:#999;
margin-top:10px;
}

.count{
color:#32c26a;
font-size:26px;
margin-top:10px;
font-weight:bold;
}

.notice{
width:340px;
margin:30px auto;
font-size:13px;
color:#f0dca0;
line-height:22px;
}

</style>
</head>

<body>

<h3>V23080280 (NGÔ QUÝ THÌN)</h3>

<div class="card">

<div class="top">
将二维码对准扫描器刷码出场
</div>

<div class="time" id="time"></div>

<div class="qr">
<img id="qr">
</div>

<div class="refresh">刷新二维码</div>

<div class="count" id="count">01:00:00</div>

</div>

<div class="notice">
尊敬的员工您好，您已进入企业涉密区域，
出于企业安全考虑，您的手机摄像头将被禁止拍摄。
感谢您的配合。
</div>

<script>

/* thời gian hiện tại */

function updateTime(){
let d=new Date()

let t=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()+" "
+d.getHours()+":"+d.getMinutes()+":"+d.getSeconds()

document.getElementById("time").innerHTML=t
}

/* QR dày hơn */

function updateQR(){
let d=new Date().getTime()

document.getElementById("qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=270x270&ecc=H&data=V23080280-"+d
}

/* đếm ngược */

let total=3600

function countdown(){

let h=Math.floor(total/3600)
let m=Math.floor((total%3600)/60)
let s=total%60

document.getElementById("count").innerHTML=
String(h).padStart(2,'0')+":"+
String(m).padStart(2,'0')+":"+
String(s).padStart(2,'0')

total--

if(total<0){
total=3600
updateQR()
}

}

updateTime()
updateQR()
countdown()

setInterval(updateTime,1000)
setInterval(countdown,1000)

</script>

</body>
</html>
