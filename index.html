<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QR ACCESS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
margin:0;
font-family:"PingFang SC","Helvetica Neue",Arial;
background:linear-gradient(180deg,#353a55,#1c2036);
text-align:center;
color:white;
}

.id{
margin-top:60px;
font-size:22px;
letter-spacing:1px;
}

.card{
background:#f2f2f2;
width:340px;
margin:auto;
margin-top:20px;
border-radius:18px;
padding:22px;
color:black;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
background:#E3B64C;
padding:16px;
border-radius:10px;
font-size:16px;
margin-bottom:10px;
}

.time{
font-size:16px;
margin:10px 0;
}

#qrcode{
display:flex;
justify-content:center;
margin:15px 0;
}

#qrcode img{
width:210px;
height:210px;
image-rendering: pixelated;
}

.refresh{
color:#9b9b9b;
font-size:14px;
margin-top:5px;
}

.count{
color:#2dbf5b;
font-size:24px;
margin-top:10px;
font-weight:500;
}

.footer{
margin-top:60px;
color:#e6d9a8;
font-size:15px;
line-height:26px;
padding:0 40px;
}

</style>
</head>

<body>

<div class="id">
V23080280 (NGÔ QUÝ THÌN)
</div>

<div class="card">

<div class="header">
将二维码对准扫描器刷码出场
</div>

<div class="time" id="time"></div>

<div id="qrcode"></div>

<div class="refresh">
刷新二维码
</div>

<div class="count" id="countdown"></div>

</div>

<div class="footer">
尊敬的员工您好，您已进入企业涉密区域，
出于企业安全考虑，您的手机摄像头将被禁止拍摄，
感谢您的配合。
</div>

<script>

function updateQR(){

let now = new Date()

let timeString =
now.getFullYear()+"-"+(now.getMonth()+1)+"-"+now.getDate()
+" "+
String(now.getHours()).padStart(2,'0')+":"+
String(now.getMinutes()).padStart(2,'0')+":"+
String(now.getSeconds()).padStart(2,'0')

document.getElementById("time").innerHTML=timeString

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"),{
text:"V23080280|NGOQUYTHIN|"+timeString,
width:210,
height:210,
correctLevel: QRCode.CorrectLevel.H
})

}

updateQR()

setInterval(updateQR,10000)

let seconds = 3600

function countdown(){

let h=Math.floor(seconds/3600)
let m=Math.floor((seconds%3600)/60)
let s=seconds%60

document.getElementById("countdown").innerHTML =
String(h).padStart(2,"0")+":"+
String(m).padStart(2,"0")+":"+
String(s).padStart(2,"0")

seconds--

}

setInterval(countdown,1000)

</script>

</body>
</html>
